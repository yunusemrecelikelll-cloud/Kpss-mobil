<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>KPSS Hazırlık v2</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#8b5cf6" />
<meta name="mobile-web-app-capable" content="yes" />

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="KPSS" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />

<link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>

<!-- ── Kullanıcı Seçim Ekranı ── -->
<div id="user-select-screen" class="user-select-screen hidden">
  <div class="user-select-inner">
    <div class="user-select-logo">🌙</div>
    <h1 class="user-select-title">KPSS Hazırlık</h1>
    <p class="user-select-sub">Kimi olarak giriş yapıyorsun?</p>

    <!-- Mevcut kullanıcı kartları -->
    <div id="user-cards-grid" class="user-cards-grid"></div>

    <!-- Yeni kullanıcı ekleme formu -->
    <div id="new-user-form" class="new-user-form hidden">
      <div class="new-user-form-inner">
        <p class="new-user-label">Adın nedir?</p>
        <input id="new-user-input" class="modal-input" type="text" maxlength="24"
          placeholder="Adını gir..." autocomplete="off" />
        <p class="new-user-label" style="margin-top:18px;margin-bottom:10px">Sen kimsin?</p>
        <div class="gender-pick-row">
          <button type="button" class="gender-btn" data-g="k" id="gender-k">👩 Kadın</button>
          <button type="button" class="gender-btn" data-g="e" id="gender-e">👨 Erkek</button>
        </div>
        <div style="display:flex;gap:10px;margin-top:18px;justify-content:center">
          <button id="new-user-cancel" class="btn btn-ghost">İptal</button>
          <button id="new-user-submit" class="btn btn-primary">Oluştur ✨</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Ana Uygulama ── -->
<div id="main-app" class="hidden">

  <div id="name-modal" class="modal-overlay hidden">
    <div class="card modal-card">
      <span class="modal-icon">🌸</span>
      <h2>Merhaba, ben senin KPSS yol arkadaşın!</h2>
      <p class="modal-text">2026 KPSS'ye birlikte hazırlanacağız.</p>
      <input id="name-input" class="modal-input" type="text" maxlength="24" placeholder="Adın nedir?" autocomplete="off" />
      <button id="name-submit" class="btn btn-primary btn-block" style="margin-bottom:10px">Hazırlığa Başla ✨</button>
    </div>
  </div>

  <!-- Üstten düşen bildirim -->
  <div id="top-notif" class="top-notif">
    <span id="top-notif-icon"></span>
    <span id="top-notif-text"></span>
  </div>

  <div id="app">
    <header class="app-header">
      <div class="brand" id="brand-home">
        <span class="brand-mark">🌙</span>
        <span class="brand-text"><span class="brand-v">KPSS</span><span class="brand-r">Hazırlık</span><span class="brand-badge">v2</span></span>
      </div>
      <nav class="header-nav-center">
        <button class="nav-pill" id="nav-home">🏠 <span>Anasayfa</span></button>
        <button class="nav-pill" id="nav-badges">🎖 <span>Rozetler</span></button>
        <button class="nav-pill" id="nav-wrong">❌ <span>Yanlışlarım</span></button>
        <button class="nav-pill" id="nav-missions">📋 <span>Görevler</span></button>
        <button class="nav-pill nav-pill-icon" id="nav-settings" title="Ayarlar">⚙️</button>
      </nav>
      <div class="header-right">
        <button id="switch-user-btn" class="user-switch-pill" title="Kullanıcı Değiştir"></button>
      </div>
    </header>
    <main id="view-root" class="view-root"></main>

    <!-- Alt navigasyon (mobilde görünür) -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="bnav-btn active" id="bnav-home">
        <span class="bnav-icon">🏠</span>
        <span>Anasayfa</span>
      </button>
      <button class="bnav-btn" id="bnav-badges">
        <span class="bnav-icon">🎖</span>
        <span>Rozetler</span>
      </button>
      <button class="bnav-btn" id="bnav-wrong">
        <span class="bnav-icon">❌</span>
        <span>Yanlışlarım</span>
      </button>
      <button class="bnav-btn" id="bnav-missions">
        <span class="bnav-icon">📋</span>
        <span>Görevler</span>
      </button>
      <button class="bnav-btn" id="bnav-settings">
        <span class="bnav-icon">⚙️</span>
        <span>Ayarlar</span>
      </button>
    </nav>
  </div>

</div>

<script src="src/js/storage.js"></script>
<script src="src/js/sounds.js"></script>
<script src="src/js/timer.js"></script>
<script src="src/js/badges.js"></script>
<script src="src/js/missions.js"></script>
<script src="src/js/leaderboard.js"></script>
<script src="src/js/charts.js"></script>
<script src="src/js/quiz.js"></script>
<script src="src/js/app.js"></script>
<script src="src/js/particles.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
