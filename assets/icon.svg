<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#231255"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Subtle ring decoration -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="28"/>
  <!-- Decorative accent dots -->
  <circle cx="96"  cy="148" r="8"  fill="rgba(196,181,253,0.35)"/>
  <circle cx="418" cy="118" r="5"  fill="rgba(232,121,249,0.30)"/>
  <circle cx="422" cy="394" r="10" fill="rgba(196,181,253,0.25)"/>
  <circle cx="88"  cy="390" r="6"  fill="rgba(232,121,249,0.28)"/>
  <!-- KPSS main text -->
  <text x="256" y="308"
    font-family="'Arial Black','Impact',Arial,sans-serif"
    font-weight="900"
    font-size="162"
    text-anchor="middle"
    letter-spacing="-8"
    fill="url(#tg)">KPSS</text>
  <!-- 2026 subtitle -->
  <text x="256" y="374"
    font-family="Arial,sans-serif"
    font-weight="700"
    font-size="46"
    text-anchor="middle"
    letter-spacing="11"
    fill="rgba(196,181,253,0.65)">2026</text>
</svg>
